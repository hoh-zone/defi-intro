[book]
authors = ["uvd"]
description = "面向开发者的 Sui DeFi 技术书：理解机制·编写代码·识别风险·构建可信赖协议"
language = "zh-CN"
src = "src"
title = "Sui DeFi：从入门到警惕"

[output.html]
# Move 类型标注（name / : / type）额外样式，见 scripts/sui-move-grammar.js
additional-css = ["theme/move-syntax-extra.css"]
# Mermaid：```mermaid / graph LR 等由 theme/mermaid.min.js + theme/mermaid-mdbook.js 在浏览器渲染
# Sui Move 语法高亮（highlightjs-sui），见 scripts/mdbook-sui-bridge.js 与 npm run build:highlight
additional-js = [
  "theme/mermaid.min.js",
  "theme/mermaid-mdbook.js",
  "theme/highlight-sui-move.bundle.js",
]
